name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: flask-app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-observability:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-observability:${{ github.sha }}

      - name: k8s manifest image 태그 업데이트
        run: |
          sed -i "s|image:.*flask-observability.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/flask-observability:${{ github.sha }}|" flask-app/k8s/manifests.yaml

      - name: 변경된 manifest 커밋 & 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/manifests.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
