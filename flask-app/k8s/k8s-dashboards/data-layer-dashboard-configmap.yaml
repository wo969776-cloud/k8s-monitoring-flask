apiVersion: v1
kind: ConfigMap
metadata:
  name: data-layer-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  data-layer-dashboard.json: |
    {
      "title": "Data Layer Dashboard (Redis + PostgreSQL)",
      "uid": "data-layer-dashboard",
      "timezone": "browser",
      "schemaVersion": 36,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Redis UP/DOWN",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "targets": [
            {
              "expr": "redis_up",
              "legendFormat": "Redis"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Redis Memory 사용량",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "targets": [
            {
              "expr": "redis_memory_used_bytes",
              "legendFormat": "Used"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [{ "color": "blue", "value": null }]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Redis Connected Clients",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "targets": [
            {
              "expr": "redis_connected_clients",
              "legendFormat": "Clients"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [{ "color": "green", "value": null }]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "PostgreSQL UP/DOWN",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "targets": [
            {
              "expr": "pg_up",
              "legendFormat": "PostgreSQL"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "title": "PostgreSQL Active Connections",
          "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "targets": [
            {
              "expr": "sum(pg_stat_activity_count)",
              "legendFormat": "Connections"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [{ "color": "green", "value": null }]
              }
            }
          }
        },
        {
          "id": 6,
          "title": "PostgreSQL DB Size",
          "type": "stat",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "targets": [
            {
              "expr": "sum(pg_database_size_bytes)",
              "legendFormat": "DB Size"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [{ "color": "blue", "value": null }]
              }
            }
          }
        },
        {
          "id": 7,
          "title": "Redis Commands/s",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(redis_commands_processed_total[1m])",
              "legendFormat": "Commands/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 8,
          "title": "Redis Keyspace Hits / Misses",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(redis_keyspace_hits_total[1m])",
              "legendFormat": "Hits"
            },
            {
              "expr": "rate(redis_keyspace_misses_total[1m])",
              "legendFormat": "Misses"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 9,
          "title": "PostgreSQL Active Connections 추이",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(pg_stat_activity_count) by (datname)",
              "legendFormat": "{{datname}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 10,
          "title": "PostgreSQL DB Size 추이",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "pg_database_size_bytes",
              "legendFormat": "{{datname}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2 }
            }
          }
        }
      ]
    }
